<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

    <title>| 🐍 PyMongoDB |</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Signika+Negative&display=swap');
        *{
            font-family: 'Signika Negative', sans-serif;
        }
        h1{
            font-family: 'Signika Negative', sans-serif;
            text-align: center;
        }
        .main_div{
            width: 100vw;
            padding: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .main_div table button a{
            text-decoration: none;
        }
        .main_div table button{
            border: none;
            cursor: pointer;
        }
        .main_div table{
            width: 700px;
            border: 3px solid #000;
        }
        .main_div  form button{
            border: 1px solid #000;
        }
        .main_div  form input{
            border-radius: 0px;
            box-shadow: none;
            outline: none;
            border: 2px solid orange;
        }
        .main_div  form{
            background: #F6F1F1;
            border-radius: 5px;
            width: 500px;
            color: #000;
            padding: 30px;
            box-shadow: rgba(60, 64, 67, 0.3) 0px 1px 2px 0px, rgba(60, 64, 67, 0.15) 0px 1px 3px 1px;
        }
    </style>
  </head>
  <body>
    <h1 class="my-3">Student Information 🧑‍🎓</h1>
    <div class="main_div">

        <div class="right_div">
            <form method="POST" action="/add">
                <p>📑 Insert Student </p>
                <hr/>
              <div class="form-group">
                <label for="exampleInputEmail1">🧑‍🎓 Student Name</label>
                <input type="text" class="form-control" name="name" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter Student Full Name">
              </div>
              <div class="form-group">
                <label for="exampleInputPassword1">📑 Student Marks</label>
                <input type="text" class="form-control" name="marks" id="exampleInputPassword1" placeholder="Enter comma-separated list of marks">
              </div>
              <div class="form-group">
                <label for="exampleInputPassword1">🏫 Student Department</label>
                <input type="text" class="form-control" name="dept" id="exampleInputPassword1" placeholder="Enter Student Department">
              </div>
              <button type="submit" class="btn btn-success w-100">Submit</button>
            </form>

        </div>

        <div class="left_div">
            <table class="table table-bordered mb-5">
                <thead>
                  <tr>
                    <th scope="col">Name</th>
                    <th scope="col">Marks</th>
                    <th scope="col">Department</th>
                    <th scope="col">Action</th>
                  </tr>
                </thead>
                <tbody>
                    {% for student in students %}
                    <tr>
                        <td>{{ student['name'] }}</td>
                        <td>{{ student['marks'] }}</td>
                        <td>{{ student['dept'] }}</td>
                        <td> 
                            <button> <a href="/update/{{ student['_id'] }}">✅</a> </button> 
                            <button> <a href="/delete/{{ student['_id'] }}">❌</a> </button> 
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            {% if update_student %}

                <form method="POST" class="my-2"  style="width: 680px;" action="/update">
                    <p>📑 Update Student </p>
                    <hr/>
                    <div class="form-row">
                        <div class="col">
                            <label for="exampleInputEmail1">🧑‍🎓 Student Name</label>
                            <input type="text" class="form-control" name="name" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter Student Full Name" value="{{ update_student['name'] }}" >
                        </div>
                        <div class="col">
                            <label for="exampleInputPassword1">🏫 Student Department</label>
                            <input type="text" class="form-control" name="dept" id="exampleInputPassword1" placeholder="Enter Student Department" value="{{ update_student['dept'] }}" >
                        </div>
                    </div>
                    <div class="form-group my-2">
                    <label for="exampleInputPassword1">📑 Student Marks</label>
                    <input type="text" class="form-control" name="marks" id="exampleInputPassword1" placeholder="Enter comma-separated list of marks" value="{{ update_student['marks'] }}" >
                    </div>
                    <input type="hidden" name="id" value="{{ update_student['_id'] }}" >
                    <button type="submit" class="btn btn-success my-2 w-100">UPDATE</button>
                </form>

            {% else %}
                <form method="POST" class="my-2"  style="width: 680px;" action="/update">
                    <p>📑 Update Student </p>
                    <hr/>
                    <div class="form-row">
                        <div class="col">
                            <label for="exampleInputEmail1">🧑‍🎓 Student Name</label>
                            <input type="text" class="form-control" name="name" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter Student Full Name"  >
                        </div>
                        <div class="col">
                            <label for="exampleInputPassword1">🏫 Student Department</label>
                            <input type="text" class="form-control" name="dept" id="exampleInputPassword1" placeholder="Enter Student Department" >
                        </div>
                    </div>
                    <div class="form-group my-2">
                    <label for="exampleInputPassword1">📑 Student Marks</label>
                    <input type="text" class="form-control" name="marks" id="exampleInputPassword1" placeholder="Enter comma-separated list of marks" >
                    </div>
                    <input type="hidden" name="id" value="" >
                    <button type="submit" class="btn btn-success my-2 w-100">UPDATE</button>
                </form>
            {% endif %}

        </div>
        
     
          
    </div>
        


    <!-- Optional JavaScript -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js" integrity="sha256-oP6HI9z1XaZNBrJURtCoUT5SUnxFr8s3BzRl+cbzUq8=" crossorigin="anonymous"></script>

    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>


  </body>
</html>
